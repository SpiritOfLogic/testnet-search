<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Query}} - Testnet Search</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #fafafa; color: #222; }
        .header { max-width: 800px; margin: 0 auto 20px; }
        .header a { text-decoration: none; color: #222; font-weight: bold; font-size: 1.3em; }
        .search-form { margin: 10px 0 20px; }
        .search-form input[type="text"] { padding: 8px 12px; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; width: 400px; max-width: 70%; }
        .search-form button { padding: 8px 16px; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; background: #f8f8f8; cursor: pointer; }
        .results { max-width: 800px; margin: 0 auto; }
        .meta { color: #666; margin-bottom: 20px; }
        .result { margin-bottom: 24px; }
        .result h3 { margin: 0 0 2px; font-size: 1.15em; }
        .result h3 a { color: #1a0dab; text-decoration: none; }
        .result h3 a:hover { text-decoration: underline; }
        .result .url { color: #006621; font-size: 0.9em; margin-bottom: 4px; }
        .result .snippet { color: #444; font-size: 0.95em; line-height: 1.5; }
        .result .snippet b { color: #222; }
        .pagination { margin-top: 30px; text-align: center; }
        .pagination a { margin: 0 10px; color: #1a0dab; text-decoration: none; }
        .pagination a:hover { text-decoration: underline; }
        .no-results { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">Testnet Search</a>
        <div class="search-form">
            <form method="GET" action="/search">
                <input type="text" name="q" value="{{.Query}}">
                <button type="submit">Search</button>
            </form>
        </div>
    </div>
    <div class="results">
        <div class="meta">About {{.Total}} results</div>
        {{if .Results}}
            {{range .Results}}
            <div class="result">
                <h3><a href="{{.URL}}">{{if .Title}}{{.Title}}{{else}}{{.URL}}{{end}}</a></h3>
                <div class="url">{{.URL}}</div>
                <div class="snippet">{{.Snippet}}</div>
            </div>
            {{end}}
            <div class="pagination">
                {{if .HasPrev}}<a href="/search?q={{.QueryEscaped}}&page={{.PrevPage}}">&larr; Previous</a>{{end}}
                {{if .HasNext}}<a href="/search?q={{.QueryEscaped}}&page={{.NextPage}}">Next &rarr;</a>{{end}}
            </div>
        {{else}}
            <p class="no-results">No results found for "{{.Query}}".</p>
        {{end}}
    </div>
</body>
</html>
