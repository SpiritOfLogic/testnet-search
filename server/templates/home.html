<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Testnet Search</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 40px 20px; background: #fafafa; color: #222; }
        .container { max-width: 600px; margin: 80px auto 0; text-align: center; }
        h1 { font-size: 2.5em; margin-bottom: 0.3em; }
        p.tagline { color: #666; margin-bottom: 2em; }
        form { margin-bottom: 1.5em; }
        input[type="text"] { width: 100%; max-width: 500px; padding: 12px 16px; font-size: 1.1em; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .buttons { margin-top: 1em; }
        button { padding: 10px 24px; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; background: #f8f8f8; cursor: pointer; margin: 0 4px; }
        button:hover { background: #e8e8e8; }
        .browse-link { margin-top: 2em; }
        .browse-link a { color: #1a0dab; text-decoration: none; font-size: 1.05em; }
        .browse-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Testnet Search</h1>
        <p class="tagline">Search the agent testnet</p>
        <form method="GET" action="/search">
            <input type="text" name="q" placeholder="Search the testnet..." autofocus>
            <div class="buttons">
                <button type="submit">Search</button>
                <button type="submit" name="lucky" value="1">Get Lucky</button>
            </div>
        </form>
        <div class="browse-link">
            <a href="/browse">Browse all sites</a>
        </div>
    </div>
</body>
</html>
